<div class="result-screen">
    <div class="result-card">
        <header class="result-header">
            <div class="confetti-icon">🎉</div>
            <h1>Spiel Beendet!</h1>
            <p>Mal sehen, wer den Thron bestiegen hat...</p>
        </header>

        <section class="personal-stats">
            <div class="stat-box">
                <span class="label">Deine Punkte</span>
                <span class="value counter" data-target="2450">0</span>
            </div>
            <div class="stat-box">
                <span class="label">Richtige Antworten</span>
                <span class="value">12 / 15</span>
            </div>
        </section>

        <section class="podium-container">
            <div class="podium-step silver">
                <div class="player-avatar">🐼</div>
                <div class="player-name">Sarah</div>
                <div class="rank-box">2</div>
                <div class="final-score">2.100</div>
            </div>

            <div class="podium-step gold">
                <div class="crown">👑</div>
                <div class="player-avatar">🦊</div>
                <div class="player-name">Du</div>
                <div class="rank-box">1</div>
                <div class="final-score">2.450</div>
            </div>

            <div class="podium-step bronze">
                <div class="player-avatar">🐯</div>
                <div class="player-name">Max_99</div>
                <div class="rank-box">3</div>
                <div class="final-score">1.850</div>
            </div>
        </section>

        <footer class="result-footer">
            <button class="btn-restart">Nochmal spielen</button>
            <button class="btn-exit">Lobby verlassen</button>
        </footer>
    </div>
</div>
